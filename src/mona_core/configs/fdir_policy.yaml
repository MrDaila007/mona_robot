fdir_manager:
  ros__parameters:
    # Global FDIR timings
    recovery_power_off_time:  3.0   # [sec] Duration to hold physical power cutoff to dissipate residual charge
    timeout_before_reboot:    5.0   # [sec] Watchdog timeout threshold before triggering component restart

    components:
      # =========================================================
      # TIER 1: FATAL (Core Safety & Mobility)
      # Critical infrastructure. Failure results in immediate hardware E-STOP.
      # =========================================================
      safety_core:
        enabled:          true
        tier:             "FATAL"
        node_name:        "safety_node"
        reset_mechanism:  "lifecycle_service"
        startup_time:     3.0       # [sec] Fast boot for core logic evaluation

      control_mux:
        enabled:          true
        tier:             "FATAL"
        node_name:        "twist_mux_node"
        reset_mechanism:  "lifecycle_service"
        startup_time:     3.0       # [sec] Fast boot for velocity command routing

      traction_controller:
        enabled:          false
        tier:             "FATAL"
        node_name:        "mona_traction_controller"
        reset_mechanism:  "lifecycle_service"
        startup_time:     5.0       # [sec] Time to establish software bridges to motor drivers (ros2_control)

      drive_inverters:
        enabled:          false
        tier:             "FATAL"
        node_name:        "physical_drive_mcu"
        reset_mechanism:  "hardware_relay"
        reset_topic:      "hardware/power/drive_inverters"
        startup_time:     15.0      # [sec] Extended time required for heavy-duty inverter capacitors to pre-charge

      # =========================================================
      # TIER 2: PRIMARY (Autonomous Navigation & Compliance)
      # Essential for autonomous mission. Failure triggers degraded mode or local stop.
      # =========================================================
      fleet_adapter:
        enabled:          false
        tier:             "PRIMARY"
        node_name:        "mona_fleet_adapter"
        reset_mechanism:  "lifecycle_service"
        startup_time:     5.0       # [sec] Time to establish MQTT/VDA5050 connection with the central fleet server

      perception_merger:
        enabled:          true
        tier:             "PRIMARY"
        node_name:        "mona_lidar_merger"
        reset_mechanism:  "lifecycle_service"
        fallback_action:  "drive_blind"
        startup_time:     10.0      # [sec] Pointcloud fusion initialization

      signaling_system:
        enabled:          false
        tier:             "PRIMARY"
        node_name:        "mona_signaling_node"
        reset_mechanism:  "lifecycle_service"
        fallback_action:  "trigger_audio_only"
        startup_time:     3.0       # [sec] ISO 3691-4 requires visual/audio alerts to be active before any motion

      safety_lidar_front:
        enabled:          false
        tier:             "PRIMARY"
        node_name:        "mona_lidar_front"
        reset_mechanism:  "hardware_relay"
        reset_topic:      "hardware/power/lidar_front"
        fallback_action:  "drive_reverse"
        startup_time:     40.0      # [sec] Safety scanners require extended boot for internal OS and optical self-diagnostics

      safety_lidar_back:
        enabled:          false
        tier:             "PRIMARY"
        node_name:        "mona_lidar_back"
        reset_mechanism:  "hardware_relay"
        reset_topic:      "hardware/power/lidar_back"
        fallback_action:  "drive_forward"
        startup_time:     40.0      # [sec] Safety scanners require extended boot for internal OS and optical self-diagnostics

      # =========================================================
      # TIER 3: AUXILIARY (Performance Enhancers)
      # Non-critical. Failure generates warnings but allows mission continuation.
      # =========================================================
      pallet_camera:
        enabled:          false
        tier:             "AUXILIARY"
        node_name:        "mona_pallet_camera"
        reset_mechanism:  "hardware_relay"
        reset_topic:      "hardware/power/pallet_camera"
        startup_time:     10.0      # [sec] Initialization of 3D depth processing pipeline

      imu_sensor:
        enabled:          false
        tier:             "AUXILIARY"
        node_name:        "mona_imu"
        reset_mechanism:  "hardware_relay"
        reset_topic:      "hardware/power/imu"
        startup_time:     3.0       # [sec] Gyroscope bias calibration and warm-up