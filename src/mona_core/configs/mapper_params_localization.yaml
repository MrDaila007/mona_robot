slam_toolbox:
  ros__parameters:
    # Base Parameters
    use_sim_time: true
    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: scan

    mode: localization
    map_file_name: /home/mona_dev/mona_ws/src/mona_core/maps/warehouse_map_serialized
    map_start_pose: [0.0, 0.0, 0.0]
    map_start_at_dock: true

    # Resolution and Update Rates
    map_resolution: 0.05
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 40.0
    minimum_time_interval: 0.1
    transform_timeout: 1.0
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000

    # Scan Matching Parameters
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    scan_buffer_size: 30
    scan_buffer_maximum_scan_distance: 40.0
    link_match_minimum_response_fine: 0.1  
    link_scan_maximum_distance: 1.5
    
    # Graph Optimization Settings
    do_loop_closing: true 
    loop_match_minimum_chain_size: 10           
    loop_match_maximum_variance_coarse: 3.0     
    loop_match_minimum_response_coarse: 0.35    
    loop_match_minimum_response_fine: 0.45

    # Odometry Trust (Deviation penalties)
    distance_variance_penalty: 0.3
    angle_variance_penalty: 0.3

    # Solver Plugin Settings
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_region_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None