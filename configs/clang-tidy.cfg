# Strict Enterprise Clang-Tidy Configuration
---
Checks: >
  -*,
  bugprone-*,
  cert-*,
  cppcoreguidelines-*,
  modernize-*,
  performance-*,
  readability-*,
  -cppcoreguidelines-pro-bounds-array-to-pointer-decay,
  -cppcoreguidelines-pro-type-vararg,
  -modernize-use-trailing-return-type,
  -readability-magic-numbers

# Treat all warnings as errors so CI fails on violations
WarningsAsErrors: "*"

CheckOptions:
  - key:             cppcoreguidelines-special-member-functions.AllowMissingMoveFunctions
    value:           '1'
  - key:             modernize-use-trailing-return-type.IgnoreMacros
    value:           '1'

# Apply checks only to our source code (exclude auto-generated ROS 2 files)
HeaderFilterRegex: 'src/.*'