name: CI

# Когда запускать: при пуше в main или при создании Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Сборка образа (проверка Dockerfile)
      # Мы используем аргументы Build Args, чтобы CI не спотыкался о права (как мы настраивали локально)
      - name: Build Docker Image
        run: |
          docker build . \
            --file Dockerfile \
            --tag mona_ci \
            --build-arg USER_UID=1001 \
            --build-arg USER_GID=1001

      # 2. Тестирование сборки кода внутри контейнера
      - name: Build Workspace (Colcon)
        run: |
          docker run --rm mona_ci \
            /bin/bash -c "source /opt/ros/humble/setup.bash && colcon build"