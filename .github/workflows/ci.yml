name: CI

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  schedule:
    - cron: '0 2 * * 1'

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
    name: Build & Test on ${{ matrix.os }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # 1. Setup Docker Buildx (Required for caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # 2. Build Docker Image via Buildx with caching
      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          tags: mona_ci:latest
          # Export the image to the standard Docker daemon
          # so the subsequent step (docker run) can access it
          load: true
          build-args: |
            USER_UID=1001
            USER_GID=1001
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ github.event_name == 'schedule' }}

      # 3. Execute the testing script within an isolated container
      - name: Run Global CI Script inside Docker
        run: |
          # Create the build directory on the host prior to mounting to prevent permission issues
          mkdir -p ${{ github.workspace }}/build
          
          # Run the container. The build directory is mounted to extract XML test reports.
          docker run --rm \
            -v ${{ github.workspace }}/src:/home/mona_dev/mona_ws/src \
            -v ${{ github.workspace }}/scripts:/home/mona_dev/mona_ws/scripts \
            -v ${{ github.workspace }}/configs:/home/mona_dev/mona_ws/configs \
            -v ${{ github.workspace }}/build:/home/mona_dev/mona_ws/build \
            mona_ci:latest \
            /bin/bash -c "cd /home/mona_dev/mona_ws && ./scripts/local_ci.bash"
      
      # 4. Publish Test Reports to the GitHub UI
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # Step must execute even if tests fail
        with:
          report_paths: 'build/**/test_results/**/*.xml'
          check_name: "ROS 2 Test Report"
      
      # 5. Upload coverage report to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: env.CODECOV_TOKEN != null # Executes only if the CODECOV_TOKEN secret is provisioned
        with:
          files: build/coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
