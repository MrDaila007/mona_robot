services:
  mona_dev:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        USERNAME: ${USER:-mona_dev}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    image: mona_robot:humble
    container_name: mona_dev
    
    network_mode: host
    ipc: host
    pid: host
    privileged: true
    
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - QT_QPA_PLATFORM=xcb
      - ALSOFT_DRIVERS=null
      - MESA_DEBUG=silent
      - ROS_LOCALHOST_ONLY=1
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    
    volumes:
      - ./src:/home/${USER:-mona_dev}/mona_ws/src
      - ./scripts:/home/${USER:-mona_dev}/mona_ws/scripts
      - ./configs:/home/${USER:-mona_dev}/mona_ws/configs
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/${USER:-mona_dev}/.Xauthority:rw
      - /dev/input:/dev/input:ro
      - /run/udev:/run/udev:ro
    
    devices:
      - /dev/dri:/dev/dri

    command: sleep infinity
    tty: true
    stdin_open: true